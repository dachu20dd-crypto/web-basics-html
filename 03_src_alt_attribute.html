<!DOCTYPE html>
<html>
<head>
    <title>Image Example</title>
</head>
<body>

<h2>Example of src and alt attribute</h2>

<p>This image uses the src attribute to show the picture.</p>

<img src="nature.jpg" width="400" height="300">

<p>The alt attribute should reflect the image content, so users who cannot see the image get an understanding of what the image contains</p>

<img src="nature.jpg" alt="Beautiful green nature with trees and sky" width="400" height="300">

</body>
</html>
