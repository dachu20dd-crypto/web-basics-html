<!DOCTYPE html>
<html>
<head>
    <title>Title Attribute Example</title>
</head>
<body>

<h1 title="This is the main heading of the page">
Welcome to My Webpage
</h1>

<p title="This text gives extra information when you move the mouse">
Move your mouse over this paragraph to see the tooltip.
</p>

<button title="Click this button to continue">
Click Me
</button>

</body>
</html>
